name: CI

on:
  push:
    branches: main
  pull_request:
    branches: main

jobs:
  run:
    name: Run
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Clean install
        run: bun install

      - name: Check
        run: bun run check

      - name: Type checking
        run: bun run typecheck
